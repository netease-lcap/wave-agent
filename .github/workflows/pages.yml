name: Deploy VitePress to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/vsce/e2e/demo/**'
      - 'packages/vsce/LOGO.png'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Cache ripgrep binaries
        uses: actions/cache@v6
        with:
          path: packages/agent-sdk/vendor/ripgrep
          key: ripgrep-${{ runner.os }}-${{ runner.arch }}
          restore-keys: |
            ripgrep-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: pnpm -F wave-vsce exec playwright install chromium

      - name: Build agent-sdk
        run: pnpm -F wave-agent-sdk build

      - name: Generate screenshots
        run: pnpm -F wave-vsce run test:demo

      - name: Copy screenshots to docs
        run: |
          mkdir -p docs/public/screenshots
          cp -r packages/vsce/docs/public/screenshots/* docs/public/screenshots/ 2>/dev/null || true

      - name: Build VitePress
        run: pnpm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
